<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brymen DMM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Brymen 6000-count DMM</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="status">Disconnected</span>
      <button id="test-btn">Test (AC 513.6V)</button>
      <button id="csv-btn">CSV</button>
      <button id="connect-btn">Connect</button>
    </div>
  </header>

  <div class="main">
    <div class="lcd-panel">
      <div class="lcd-col">
      <div class="lcd-frame">
        <div class="lcd-screen">
          <svg id="lcd" viewBox="0 0 510 230" preserveAspectRatio="xMidYMid meet">
            <!-- ====== TOP ANNUNCIATOR ROW ====== -->
            <g id="ann-auto" class="ann-off">
              <rect x="4" y="2" width="44" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <text x="8" y="16" font-size="13" font-weight="bold" font-family="Arial,sans-serif" fill="currentColor">AUTO</text>
            </g>
            <g id="ann-diode" class="ann-off">
              <line x1="55" y1="11" x2="68" y2="11" stroke="currentColor" stroke-width="1.5"/>
              <polygon points="65,5 65,17 73,11" fill="currentColor"/>
              <line x1="73" y1="5" x2="73" y2="17" stroke="currentColor" stroke-width="1.5"/>
            </g>
            <g id="ann-buzzer" class="ann-off">
              <polygon points="83,6 83,17 90,17 95,20 95,3 90,6" fill="currentColor"/>
              <path d="M98,7 Q102,11 98,16" fill="none" stroke="currentColor" stroke-width="1.2"/>
              <path d="M101,4 Q107,11 101,19" fill="none" stroke="currentColor" stroke-width="1.2"/>
            </g>
            <g id="ann-dbm" class="ann-off">
              <rect x="160" y="2" width="32" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.2"/>
              <text x="164" y="16" font-size="11" font-weight="bold" font-family="Arial,sans-serif" fill="currentColor">A-H</text>
            </g>
            <text id="ann-max" class="annunciator ann-off" font-size="15" x="310" y="17">MAX</text>
            <text id="ann-min" class="annunciator ann-off" font-size="15" x="358" y="17">MIN</text>

            <!-- ====== LEFT ANNUNCIATOR COLUMN ====== -->
            <!-- DC: three horizontal bars (two dashed, one solid) -->
            <g id="ann-dc" class="ann-off">
              <line x1="5" y1="32" x2="10" y2="32" stroke="currentColor" stroke-width="1.5"/>
              <line x1="13" y1="32" x2="18" y2="32" stroke="currentColor" stroke-width="1.5"/>
              <line x1="21" y1="32" x2="26" y2="32" stroke="currentColor" stroke-width="1.5"/>
              <line x1="5" y1="36" x2="10" y2="36" stroke="currentColor" stroke-width="1.5"/>
              <line x1="13" y1="36" x2="18" y2="36" stroke="currentColor" stroke-width="1.5"/>
              <line x1="21" y1="36" x2="26" y2="36" stroke="currentColor" stroke-width="1.5"/>
              <line x1="5" y1="40" x2="26" y2="40" stroke="currentColor" stroke-width="1.5"/>
            </g>
            <!-- AC: sine wave -->
            <g id="ann-ac" class="ann-off">
              <path d="M5,58 Q10,48 15,58 Q20,68 25,58" fill="none" stroke="currentColor" stroke-width="2"/>
            </g>
            <!-- Triangle -->
            <g id="ann-delta" class="ann-off">
              <polygon points="15,68 5,84 25,84" fill="none" stroke="currentColor" stroke-width="1.5"/>
            </g>
            <!-- Rectangle (hold indicator) -->
            <g id="ann-bolt" class="ann-off">
              <rect x="5" y="90" width="20" height="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
            </g>
            <!-- Battery -->
            <g id="ann-bat" class="ann-off">
              <rect x="5" y="112" width="18" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <rect x="23" y="115" width="3" height="6" fill="currentColor"/>
              <line x1="11" y1="115" x2="11" y2="121" stroke="currentColor" stroke-width="1.2"/>
              <line x1="8" y1="118" x2="14" y2="118" stroke="currentColor" stroke-width="1.2"/>
            </g>
            <!-- LoZ -->
            <text id="ann-loz" class="annunciator ann-off" font-size="11" font-family="Arial,sans-serif" x="5" y="142">LoZ</text>
            <!-- COMM in box -->
            <g id="ann-cont" class="ann-off">
              <rect x="2" y="148" width="38" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/>
              <text x="5" y="159" font-size="9" font-weight="bold" font-family="Arial,sans-serif" fill="currentColor">COMM</text>
            </g>

            <!-- ====== MINUS SIGN ====== -->
            <rect id="ann-minus" class="seg-off" x="5" y="198" width="26" height="5" rx="1"/>

            <!-- ====== DIGIT 1 (ox=55, oy=28) T=18 G=2 ====== -->
            <polygon id="d1a" class="seg-off" points="66,37 75,28 107,28 116,37 107,46 75,46"/>
            <polygon id="d1f" class="seg-off" points="64,39 73,48 73,90 64,99 55,90 55,48"/>
            <polygon id="d1b" class="seg-off" points="118,39 127,48 127,90 118,99 109,90 109,48"/>
            <polygon id="d1g" class="seg-off" points="66,110 75,101 107,101 116,110 107,119 75,119"/>
            <polygon id="d1e" class="seg-off" points="64,121 73,130 73,173 64,182 55,173 55,130"/>
            <polygon id="d1c" class="seg-off" points="118,121 127,130 127,173 118,182 109,173 109,130"/>
            <polygon id="d1d" class="seg-off" points="66,184 75,175 107,175 116,184 107,193 75,193"/>
            <circle id="dp1" class="dp-off" cx="139" cy="190" r="5"/>

            <!-- ====== DIGIT 2 (ox=152, oy=28) T=18 G=2 ====== -->
            <polygon id="d2a" class="seg-off" points="163,37 172,28 204,28 213,37 204,46 172,46"/>
            <polygon id="d2f" class="seg-off" points="161,39 170,48 170,90 161,99 152,90 152,48"/>
            <polygon id="d2b" class="seg-off" points="215,39 224,48 224,90 215,99 206,90 206,48"/>
            <polygon id="d2g" class="seg-off" points="163,110 172,101 204,101 213,110 204,119 172,119"/>
            <polygon id="d2e" class="seg-off" points="161,121 170,130 170,173 161,182 152,173 152,130"/>
            <polygon id="d2c" class="seg-off" points="215,121 224,130 224,173 215,182 206,173 206,130"/>
            <polygon id="d2d" class="seg-off" points="163,184 172,175 204,175 213,184 204,193 172,193"/>
            <circle id="dp2" class="dp-off" cx="236" cy="190" r="5"/>

            <!-- ====== DIGIT 3 (ox=249, oy=28) T=18 G=2 ====== -->
            <polygon id="d3a" class="seg-off" points="260,37 269,28 301,28 310,37 301,46 269,46"/>
            <polygon id="d3f" class="seg-off" points="258,39 267,48 267,90 258,99 249,90 249,48"/>
            <polygon id="d3b" class="seg-off" points="312,39 321,48 321,90 312,99 303,90 303,48"/>
            <polygon id="d3g" class="seg-off" points="260,110 269,101 301,101 310,110 301,119 269,119"/>
            <polygon id="d3e" class="seg-off" points="258,121 267,130 267,173 258,182 249,173 249,130"/>
            <polygon id="d3c" class="seg-off" points="312,121 321,130 321,173 312,182 303,173 303,130"/>
            <polygon id="d3d" class="seg-off" points="260,184 269,175 301,175 310,184 301,193 269,193"/>
            <circle id="dp3" class="dp-off" cx="333" cy="190" r="5"/>

            <!-- ====== DIGIT 4 (ox=346, oy=28) T=18 G=2 ====== -->
            <polygon id="d4a" class="seg-off" points="357,37 366,28 398,28 407,37 398,46 366,46"/>
            <polygon id="d4f" class="seg-off" points="355,39 364,48 364,90 355,99 346,90 346,48"/>
            <polygon id="d4b" class="seg-off" points="409,39 418,48 418,90 409,99 400,90 400,48"/>
            <polygon id="d4g" class="seg-off" points="357,110 366,101 398,101 407,110 398,119 366,119"/>
            <polygon id="d4e" class="seg-off" points="355,121 364,130 364,173 355,182 346,173 346,130"/>
            <polygon id="d4c" class="seg-off" points="409,121 418,130 418,173 409,182 400,173 400,130"/>
            <polygon id="d4d" class="seg-off" points="357,184 366,175 398,175 407,184 398,193 366,193"/>

            <!-- ====== RIGHT UNIT COLUMN (large text) ====== -->
            <text id="ann-vfd" class="annunciator ann-off" font-size="20" font-family="Arial,sans-serif" x="435" y="48">VFD</text>
            <text id="ann-mega" class="annunciator ann-off" font-size="26" font-family="Arial,sans-serif" font-weight="bold" x="435" y="78">M</text>
            <text id="ann-ohm" class="annunciator ann-off" font-size="26" font-family="Arial,sans-serif" font-weight="bold" x="458" y="78">&#x2126;</text>
            <text id="ann-kilo" class="annunciator ann-off" font-size="24" font-family="Arial,sans-serif" font-weight="bold" x="435" y="104">k</text>
            <text id="ann-hz" class="annunciator ann-off" font-size="22" font-family="Arial,sans-serif" font-weight="bold" x="453" y="104">Hz</text>
            <text id="ann-nano" class="annunciator ann-off" font-size="24" font-family="Arial,sans-serif" font-weight="bold" x="435" y="130">n</text>
            <text id="ann-farad" class="annunciator ann-off" font-size="24" font-family="Arial,sans-serif" font-weight="bold" x="453" y="130">F</text>
            <text id="ann-micro" class="annunciator ann-off" font-size="22" font-family="Arial,sans-serif" font-weight="bold" x="435" y="156">&#x00B5;</text>
            <text id="ann-milli" class="annunciator ann-off" font-size="24" font-family="Arial,sans-serif" font-weight="bold" x="435" y="186">m</text>
            <text id="ann-volt" class="annunciator ann-off" font-size="26" font-family="Arial,sans-serif" font-weight="bold" x="456" y="186">V</text>
            <text id="ann-amp" class="annunciator ann-off" font-size="26" font-family="Arial,sans-serif" font-weight="bold" x="480" y="186">A</text>

            <!-- ====== BARGRAPH ====== -->
            <g id="bargraph" opacity="0.35">
              <rect x="40" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="48" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="56" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="64" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="72" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="80" y="208" width="6" height="12" fill="#ddd8d0"/>

              <rect x="120" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="128" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="136" y="208" width="6" height="12" fill="#ddd8d0"/>

              <rect x="160" y="208" width="6" height="12" fill="#ddd8d0"/>

              <rect x="176" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="184" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="192" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="200" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="208" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="216" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="224" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="232" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="240" y="208" width="6" height="12" fill="#ddd8d0"/>

              <rect x="384" y="208" width="6" height="12" fill="#ddd8d0"/>
              <rect x="392" y="208" width="6" height="12" fill="#ddd8d0"/>
              <polygon points="402,208 402,220 412,214" fill="#ddd8d0"/>
            </g>
          </svg>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="chart"></canvas>
        <div class="chart-controls">
          <button id="chart-zout">&minus;</button>
          <input type="range" id="chart-scroll" min="0" max="1000" value="1000">
          <button id="chart-zin">+</button>
        </div>
        <div class="chart-y-controls">
          <label><input type="checkbox" id="chart-y-auto" checked> Auto Y</label>
          <label>min <input type="number" id="chart-y-min" step="any" disabled></label>
          <label>max <input type="number" id="chart-y-max" step="any" disabled></label>
        </div>
      </div>
      </div>
    </div>

    <div class="data-panel">
      <div class="log-header">
        <h2>Log</h2>
        <div class="log-interval">
          <label for="log-interval">every</label>
          <input type="number" id="log-interval" value="1" min="1" max="3600" step="1">
          <span>s</span>
        </div>
      </div>
      <div id="log-container" class="log-container"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
